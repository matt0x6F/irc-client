name: CI

on:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go Tests and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install system dependencies
        # The root `main` package links wails v3's desktop cgo (internal/
        # operatingsystem + assetserver/webview), whose pkg-config requires
        # gtk4 + webkitgtk-6.0 even for a pure-logic `go test` and even under
        # the `server` tag (that cgo isn't tag-guarded in this wails alpha).
        # Same deps the e2e job installs; needed so `./...` (incl. root) compiles.
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Stub embedded frontend assets
        # The root `main` package embeds frontend/dist (//go:embed all:frontend/dist),
        # which is gitignored and not built in this job. The root-package Go tests are
        # pure logic and never read the assets, but the embed must resolve for the
        # package to compile. A stub file satisfies it without a full frontend build,
        # so `./...` (incl. the root package) can be tested/vetted here.
        run: mkdir -p frontend/dist && printf '<!doctype html><title>ci test stub</title>' > frontend/dist/index.html

      - name: Run tests
        env:
          CGO_ENABLED: '1'
        run: go test -race -tags fts5 ./... -count=1 -timeout 120s

      - name: Run vet
        env:
          CGO_ENABLED: '1'
        run: go vet -tags fts5 ./...

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

  frontend:
    name: Frontend Tests and Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run
