[project]
site_name = "Cascade Chat"
site_description = "A modern, multi-platform IRC client"
# Project page served under /irc-client/ — required so asset/link base paths
# resolve correctly on GitHub Pages.
site_url = "https://matt0x6f.github.io/irc-client/"
docs_dir = "docs/public"
nav = [
  { "Home" = "index.md" },
  { "User Guide" = [
    "users/install.md",
    "users/connecting.md",
    "users/commands.md",
    "users/plugins.md",
  ] },
  { "Developers" = [
    "developers/plugin-system.md",
    "developers/events.md",
    "developers/ircv3-support.md",
    "developers/releases.md",
  ] },
]

[project.theme]
# Zensical defaults to its own modern theme. To retain the Material for MkDocs
# look-and-feel, confirm the exact key against the live docs during Task 4
# (zensical.org/docs → theme/customization). Leave this section minimal until
# the build in Task 4 confirms valid keys; do NOT guess keys that error.
