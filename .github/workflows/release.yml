name: macOS Build & Release

# Two intentional paths, one build job:
#   - Every merge to main: build + package the macOS app and upload it as a
#     45-day workflow artifact (version "dev-<sha7>"). Verifies the app still
#     builds/packages on macOS and lets a contributor grab a test DMG from the
#     Actions tab. This is NOT a release.
#   - Publishing a GitHub Release (incl. pre-releases): build + package and
#     attach the DMG to that release. The release/tag is created by a human, so
#     publishing is the deliberate act that ships a build. Version comes from
#     the release's tag (minus the leading "v"). Drafts don't trigger anything
#     until published.
on:
  push:
    branches: [main]
  release:
    types: [published]

# Required so the release path can upload the DMG asset to the release.
permissions:
  contents: write

jobs:
  macos:
    name: Build & package macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.103

      - name: Derive version
        # Runs before the build so the version can be stamped into the binary via
        # -ldflags. Release builds use the release's tag (minus the leading "v");
        # merge-to-main builds use a short-SHA dev label.
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "release" ]]; then
            echo "value=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build universal app & DMG
        # The fts5 tag + CGO (SQLite FTS) and version ldflags are applied by the v3
        # platform Taskfile (build/darwin/Taskfile.yml). It reads APP_VERSION/
        # APP_COMMIT/APP_BUILD_DATE env overrides to stamp the release metadata
        # read by GetBuildInfo (see version.go). Produces bin/cascade.app (universal).
        env:
          CGO_ENABLED: '1'
          APP_VERSION: ${{ steps.version.outputs.value }}
          APP_COMMIT: ${{ github.sha }}
        run: |
          export APP_COMMIT="${APP_COMMIT::7}"
          export APP_BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Builds the universal .app and wraps it in a .dmg via the same Taskfile
          # path as local `task dmg-universal` (proper staging + Applications link).
          # Uses hdiutil; run `brew install create-dmg` first for a prettier layout.
          wails3 task darwin:dmg:universal
          echo "DMG=bin/Cascade-${APP_VERSION}-universal.dmg" >> "$GITHUB_ENV"

      - name: Upload build artifact (merge to main)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: cascade-macos-universal
          path: ${{ env.DMG }}
          retention-days: 45

      - name: Attach DMG to release
        if: github.event_name == 'release'
        # The release already exists (a human published it), so we only upload the
        # asset. --clobber overwrites a stale DMG if the workflow is re-run.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" "$DMG" --clobber
