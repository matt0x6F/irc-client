name: e2e

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps (webkit2gtk 4.0, xvfb, build tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config xvfb

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install e2e deps + browser
        run: |
          npm ci
          npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run e2e under xvfb
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" npx playwright test
        working-directory: e2e
        env:
          CGO_ENABLED: '1'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
