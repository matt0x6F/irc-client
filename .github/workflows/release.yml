name: Build & Release

# Two intentional paths, fanning out across macOS / Windows / Linux (amd64+arm64):
#   - Every merge to main: build + package all platforms and auto-publish them as a
#     single GitHub *pre-release*. The version is derived from the highest stable
#     release (patch-bumped, suffixed -rc.<run_number>) so it ranks above the last
#     stable but below the eventual stable of that line — exactly what the in-app
#     updater needs to offer it to users on the Prerelease channel. Every platform's
#     updater archive + installer is attached, with one combined SHA256SUMS.
#   - Publishing a GitHub Release: build + package all platforms and attach the
#     assets to that release. The release/tag is created by a human, so publishing is
#     the deliberate act that ships a stable build. Version comes from the release's
#     tag (minus the leading "v"). Drafts don't trigger anything until published.
#
# Topology: a derive-version job computes the version once; five native build legs
# (one per OS+arch; macOS is a single universal binary) fan out and upload their
# artifacts; a final release job fans in, computes ONE SHA256SUMS over every asset,
# and does the gh release create/upload. All legs build natively (no Docker cross)
# on GA hosted runners, so CGO + the fts5 SQLite tag + version ldflags are applied
# correctly per target.
#
# The pre-release is created with the default GITHUB_TOKEN, whose events do NOT
# re-trigger this workflow's `release: published` path — so there's no recursion.
on:
  push:
    branches: [main]
  release:
    types: [published]

# Required so the release path can upload assets to the release.
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # Make publication the final stage of the same tested pipeline. These reusable
  # workflows also run directly on pull requests, while main/release builds call
  # them here so an RC or stable artifact cannot publish before both gates pass.
  quality-gate:
    name: Unit, race, lint & frontend gate
    uses: ./.github/workflows/ci.yml

  e2e-gate:
    name: Headless IRC end-to-end gate
    uses: ./.github/workflows/e2e.yml

  derive-version:
    name: Derive version
    needs: [quality-gate, e2e-gate]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      value: ${{ steps.version.outputs.value }}
      notes_start: ${{ steps.version.outputs.notes_start }}
    steps:
      - name: Derive version
        # Release builds use the release's tag (minus the leading "v"). Merge-to-main
        # builds derive an auto pre-release version: take the highest STABLE release by
        # SemVer order (never a prerelease), bump the patch, and append a monotonic
        # -rc.<run_number>. That guarantees the tag sorts above the last stable (so
        # Prerelease-channel users are offered it) and below the eventual stable of the
        # same line (so they later roll onto stable). Picking by `sort -V` rather than
        # creation date keeps it correct even if a stable hotfix is published out of
        # chronological order. Emits `tag` (with the leading "v", used for the GitHub
        # release), `value` (without, stamped as APP_VERSION and into filenames), and
        # `notes_start` — the tag the auto-generated changelog is diffed from: the
        # previous RC if one exists, else the latest stable.
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          RUN_NUMBER: ${{ github.run_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [[ "$EVENT_NAME" == "release" ]]; then
            echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
            echo "value=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            STABLE_TAG="$(gh release list --exclude-pre-releases --exclude-drafts --limit 50 \
                            --json tagName -q '.[].tagName' | sort -V | tail -1)"
            BASE="${STABLE_TAG:-v0.0.0}"
            BASE="${BASE#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))-rc.${RUN_NUMBER}"
            # Newest non-draft prerelease (by date), empty if there is none. The
            # changelog diffs from it when present so an RC shows only its own delta;
            # otherwise it falls back to the latest stable (and finally to empty for a
            # brand-new repo with neither, where GitHub auto-picks the start point).
            PREV_RC="$(gh release list --limit 50 --json tagName,isPrerelease,isDraft \
                         -q 'map(select(.isPrerelease and (.isDraft|not)))[0].tagName // empty')"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "notes_start=${PREV_RC:-$STABLE_TAG}" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    name: Build macOS (universal)
    needs: derive-version
    runs-on: macos-latest
    env:
      CGO_ENABLED: '1'
      APP_VERSION: ${{ needs.derive-version.outputs.value }}
      APP_COMMIT: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.108
      - name: Build universal app, DMG & updater zip
        # The fts5 tag + CGO and version ldflags are applied by the v3 platform
        # Taskfile (build/darwin/Taskfile.yml), which reads APP_VERSION/APP_COMMIT/
        # APP_BUILD_DATE to stamp the metadata GetBuildInfo reports. dmg:universal
        # produces the human-download .dmg; zip:universal produces the updater .zip
        # (the .app wrapped as a single top-level entry).
        run: |
          export APP_COMMIT="${APP_COMMIT::7}"
          export APP_BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          wails3 task darwin:dmg:universal
          wails3 task darwin:zip:universal
      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: |
            bin/Cascade-*-universal.dmg
            bin/Cascade-*-universal.zip
          retention-days: 45
          if-no-files-found: error

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    needs: derive-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    env:
      CGO_ENABLED: '1'
      APP_VERSION: ${{ needs.derive-version.outputs.value }}
      APP_COMMIT: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.108
      - name: Install NSIS
        # The arm64 image currently includes NSIS, while the amd64 image does not.
        # Reuse an existing makensis first: forcing a newer nsis.install conflicts
        # with the arm64 image's pinned `nsis` meta-package. When NSIS is absent,
        # download the pinned install package directly because Chocolatey's V2
        # metadata lookup can return a transient 503 while choco still exits zero.
        # curl gives the download real retry/failure semantics, and a local source
        # avoids a second metadata lookup. Export the verified directory because
        # machine PATH changes are not reflected in the already-running job.
        run: |
          $nsisDir = @(
            'C:\Program Files (x86)\NSIS'
            'C:\Program Files\NSIS'
          ) | Where-Object {
            Test-Path -Path (Join-Path $_ 'makensis.exe') -PathType Leaf
          } | Select-Object -First 1

          if (-not $nsisDir) {
            $nsisVersion = '3.12.0'
            $packageDir = Join-Path $env:RUNNER_TEMP 'nsis-package'
            $packagePath = Join-Path $packageDir "nsis.install.$nsisVersion.nupkg"
            $nsisDir = 'C:\Program Files (x86)\NSIS'

            New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
            curl.exe --fail --location --retry 5 --retry-all-errors --retry-delay 5 `
              --output $packagePath `
              "https://community.chocolatey.org/api/v2/package/nsis.install/$nsisVersion"
            choco install nsis.install --version $nsisVersion --source $packageDir -y --no-progress
          }

          $makensis = Join-Path $nsisDir 'makensis.exe'
          if (-not (Test-Path $makensis -PathType Leaf)) {
            throw "NSIS installation completed without creating $makensis"
          }
          $nsisDir | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - name: Install ARM64 C toolchain (llvm-mingw)
        # The gcc preinstalled on windows-11-arm is an x86_64 mingw build: its
        # assembler can't emit ARM64, so go-sqlite3's cgo dies with
        # "gcc_arm64.S: no such instruction: stp x29,x30,...". llvm-mingw gives a
        # native aarch64, GNU-ABI clang that drops straight into cgo's mingw flow.
        # Host == target == arm64, so this is a native build, not a cross-compile.
        # Extract with System32's bsdtar by absolute path: in a `shell: bash` step the
        # bare `tar` is Git's GNU tar (its usr/bin precedes System32 on PATH), which
        # can't read a .zip AND parses the C:/D: drive colon as an rsh host — failing
        # with "tar: Cannot connect to C: resolve failed". bsdtar handles zips and
        # Windows drive paths natively. Pin the llvm-mingw version for reproducibility.
        if: matrix.arch == 'arm64'
        shell: bash
        env:
          LLVM_MINGW_VERSION: '20260616'
        run: |
          url="https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VERSION}/llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-aarch64.zip"
          curl -fsSL -o "$RUNNER_TEMP/llvm-mingw.zip" "$url"
          mkdir -p "$RUNNER_TEMP/llvm-mingw"
          /c/Windows/System32/tar.exe -xf "$RUNNER_TEMP/llvm-mingw.zip" -C "$RUNNER_TEMP/llvm-mingw"
          echo "$RUNNER_TEMP/llvm-mingw/llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-aarch64/bin" >> "$GITHUB_PATH"
          echo "CC=aarch64-w64-mingw32-clang" >> "$GITHUB_ENV"
          echo "CXX=aarch64-w64-mingw32-clang++" >> "$GITHUB_ENV"
      - name: Build updater zip & NSIS installer
        shell: bash
        # CGO_ENABLED=1 is read from the process env by the platform Taskfile, so the
        # native Windows build carries fts5 + version ldflags. zip:updater wraps the
        # bare cascade.exe (single top-level entry) for the in-app updater; package
        # builds the download-only NSIS installer.
        run: |
          export APP_COMMIT="${APP_COMMIT::7}"
          export APP_BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          wails3 task windows:zip:updater ARCH=${{ matrix.arch }}
          wails3 task windows:package ARCH=${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows-${{ matrix.arch }}
          path: |
            bin/Cascade-*-windows-${{ matrix.arch }}.zip
            bin/cascade-${{ matrix.arch }}-installer.exe
          retention-days: 45
          if-no-files-found: error

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    needs: derive-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      CGO_ENABLED: '1'
      APP_VERSION: ${{ needs.derive-version.outputs.value }}
      APP_COMMIT: ${{ github.sha }}
      GOARCH: ${{ matrix.arch }}
      # appimagetool needs FUSE to mount; extract-and-run avoids requiring libfuse2
      # on the runner. nfpm reads APP_VERSION + GOARCH for the deb/rpm version+arch,
      # and the maintainer field from the git committer identity.
      APPIMAGE_EXTRACT_AND_RUN: '1'
      GIT_COMMITTER_NAME: 'Cascade CI'
      GIT_COMMITTER_EMAIL: 'ci@users.noreply.github.com'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install GTK/WebKit build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libgtk-4-dev libwebkitgtk-6.0-dev
      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.108
      - name: Build updater tarball, AppImage, deb & rpm
        # CGO_ENABLED=1 (process env) + the native gcc give an fts5 binary. The native
        # leg builds in-place (no Docker) because OS==linux and target arch == host
        # arch. targz:updater wraps the bare cascade binary (single top-level entry)
        # for the in-app updater; package builds the download-only AppImage/deb/rpm.
        run: |
          export APP_COMMIT="${APP_COMMIT::7}"
          export APP_BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          wails3 task linux:targz:updater ARCH=${{ matrix.arch }}
          wails3 task linux:package ARCH=${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-${{ matrix.arch }}
          path: |
            bin/Cascade-*-linux-${{ matrix.arch }}.tar.gz
            bin/*.AppImage
            bin/*.deb
            bin/*.rpm
          retention-days: 45
          if-no-files-found: error

  release:
    name: Assemble checksums & publish
    needs: [derive-version, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Compute combined SHA256SUMS
        # One checksum file over every attached asset. Listing by BASENAME (run from
        # inside dist/) is what the updater's github provider needs: it matches the
        # SHA256SUMS line to the downloaded asset's name. Excludes the file itself.
        working-directory: dist
        run: |
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%P\n' | sort | xargs shasum -a 256 > SHA256SUMS
          echo "Assets:" && cat SHA256SUMS
      - name: Publish pre-release (merge to main)
        if: github.event_name == 'push'
        # Auto-publish the merge build as a GitHub pre-release so testers on the
        # Prerelease update channel pick it up. Notes are GitHub's auto-generated
        # changelog diffed from NOTES_START (previous RC, else last stable), with the
        # updater hint prepended. Using the default GITHUB_TOKEN means this release
        # event does NOT re-trigger the workflow.
        env:
          TAG: ${{ needs.derive-version.outputs.tag }}
          SHA: ${{ github.sha }}
          NOTES_START: ${{ needs.derive-version.outputs.notes_start }}
        run: |
          gen=(-f tag_name="$TAG" -f target_commitish="$SHA")
          if [ -n "$NOTES_START" ]; then gen+=(-f previous_tag_name="$NOTES_START"); fi
          BODY="$(gh api "repos/$GH_REPO/releases/generate-notes" "${gen[@]}" -q '.body' 2>/dev/null || true)"
          printf '%s\n\n%s\n' \
            "Automated pre-release from main @ ${SHA:0:7}. Install via the in-app updater on the Prerelease channel." \
            "$BODY" > "$RUNNER_TEMP/notes.md"
          gh release create "$TAG" dist/* \
            --prerelease \
            --target "$SHA" \
            --title "$TAG" \
            --notes-file "$RUNNER_TEMP/notes.md"
      - name: Attach assets to release (published)
        if: github.event_name == 'release'
        # The release already exists (a human published it), so only upload assets.
        # --clobber overwrites stale assets if the workflow is re-run.
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" dist/* --clobber

  # GITHUB_TOKEN-created prereleases do not emit a release event, so publish
  # their tagged documentation explicitly after the release exists. Human-
  # published releases enter docs.yml through its release.published trigger.
  publish-prerelease-docs:
    name: Publish prerelease documentation
    if: github.event_name == 'push'
    needs: [derive-version, release]
    uses: ./.github/workflows/docs.yml
    with:
      ref: ${{ needs.derive-version.outputs.tag }}
      version: ${{ needs.derive-version.outputs.value }}
      channel: prerelease
