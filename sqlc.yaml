version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/storage/schema.sql"
    queries: "internal/storage/queries"
    gen:
      go:
        package: "db"
        out: "internal/storage/generated"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - column: "plugin_configs.config"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - column: "plugin_configs.config_schema"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
