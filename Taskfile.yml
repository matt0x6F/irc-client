version: '3'

# Cascade Chat build orchestration (Wails v3).
#
# The `build` / `package` / `run` / `dev` tasks delegate to the platform
# Taskfiles under build/ (the standard v3 layout). `wails3 dev` and
# `wails3 build` invoke these tasks. Project tasks (test, lint, sqlc, db, e2e)
# live in this file. The `fts5` build tag is hardcoded in the platform
# Taskfiles — it is required for SQLite full-text message search.

vars:
  APP_NAME: "cascade"
  BIN_DIR: "bin"
  PACKAGE_MANAGER: '{{.PACKAGE_MANAGER | default "npm"}}'
  # Vite dev-server port — must match frontend/vite.config.ts default.
  VITE_PORT: '{{.WAILS_VITE_PORT | default 5173}}'
  PLUGIN_DIR: "{{.HOME}}/.cascade-chat/plugins"
  DB_PATH: "{{.HOME}}/.cascade-chat/cascade-chat.db"

includes:
  common: ./build/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  windows: ./build/windows/Taskfile.yml

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ---------------------------------------------------------------------------
  # Wails build / run (delegates to the per-platform Taskfiles under build/)
  # ---------------------------------------------------------------------------
  build:
    desc: Build the application for the current platform
    cmds:
      - task: "{{OS}}:build"

  package:
    desc: Package a production build (.app bundle / installer)
    cmds:
      - task: "{{OS}}:package"

  dmg:
    desc: Build a distributable macOS .dmg from the current-arch app (macOS only)
    preconditions:
      - sh: test "{{OS}}" = "darwin"
        msg: "DMG packaging is macOS-only."
    cmds:
      - task: darwin:dmg

  dmg-universal:
    desc: Build a distributable universal macOS .dmg (arm64 + amd64; macOS only)
    preconditions:
      - sh: test "{{OS}}" = "darwin"
        msg: "DMG packaging is macOS-only."
    cmds:
      - task: darwin:dmg:universal

  zip-universal:
    desc: Build a universal macOS .zip + SHA256SUMS for the self-updater (arm64 + amd64; macOS only)
    preconditions:
      - sh: test "{{OS}}" = "darwin"
        msg: "Zip packaging is macOS-only."
    cmds:
      - task: darwin:zip:universal

  run:
    desc: Run the built application
    cmds:
      - task: "{{OS}}:run"

  dev:
    desc: Run in development mode with hot reload
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  generate-bindings:
    desc: Regenerate the frontend bindings from the Go services
    cmds:
      - task: common:generate:bindings

  # ---------------------------------------------------------------------------
  # Go
  # ---------------------------------------------------------------------------
  test:
    desc: Run Go tests
    cmds:
      # fts5 tag + CGO are required for the SQLite full-text-search tests.
      - CGO_ENABLED=1 go test -tags fts5 -v ./...

  test-coverage:
    desc: Run Go tests with coverage
    cmds:
      - CGO_ENABLED=1 go test -tags fts5 -v -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  fmt-check:
    desc: Verify Go formatting (fails if any file needs gofmt; mirrors CI's check)
    cmds:
      - |
        unformatted="$(gofmt -l .)"
        if [ -n "$unformatted" ]; then
          echo "These files are not gofmt-formatted (run 'task fmt'):"
          echo "$unformatted"
          exit 1
        fi

  install-hooks:
    desc: Install git hooks (pre-push runs gofmt + vet, mirroring CI's fast gates)
    cmds:
      - git config core.hooksPath .githooks
      - echo "Installed git hooks -> core.hooksPath=.githooks"

  lint:
    desc: Run Go linters
    cmds:
      - golangci-lint run ./...

  mod:
    desc: Tidy and verify Go modules
    cmds:
      - go mod tidy
      - go mod verify

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend-install:
    desc: Install frontend dependencies
    dir: "frontend"
    cmds:
      - npm install

  frontend-type-check:
    desc: Type check TypeScript (needs frontend/bindings; run generate-bindings if missing)
    dir: "frontend"
    cmds:
      - npx tsc --noEmit

  frontend-test:
    desc: Run frontend unit tests
    dir: "frontend"
    cmds:
      - npx vitest run

  # ---------------------------------------------------------------------------
  # End-to-End Tests
  # ---------------------------------------------------------------------------
  build-server:
    desc: Build the headless Wails v3 server-mode binary (-tags "server fts5") used by e2e
    summary: |
      Builds bin/cascade-server: the GUI-less HTTP server build the Playwright
      suite drives. Embeds frontend/dist, so the frontend is built first. This is
      the same recipe global-setup runs on its own; CI uses it as an explicit
      step (then sets CASCADE_SERVER_BIN so the suite skips rebuilding).
    cmds:
      - npm --prefix frontend run build
      - CGO_ENABLED=1 go build -tags "server fts5" -o {{.BIN_DIR}}/cascade-server{{exeExt}} .

  e2e:
    desc: Run full-stack e2e tests (Docker Ergo + headless server build + Playwright)
    summary: |
      global-setup builds bin/cascade-server (server mode) and spawns it; no GUI,
      so no xvfb/GTK needed. Set CASCADE_SERVER_BIN to a prebuilt binary to skip
      the build.
    dir: "e2e"
    cmds:
      - npm install
      - npx playwright install chromium
      - npx playwright test

  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  db-reset:
    desc: 'Reset database (WARNING: Deletes all data)'
    cmds:
      - rm -f "{{.DB_PATH}}"
      - echo "Database reset. Will be recreated on next run."

  db-backup:
    desc: Backup database
    cmds:
      - mkdir -p backups
      - cp "{{.DB_PATH}}" "backups/cascade-$(date +%Y%m%d-%H%M%S).db"
      - echo "Backed up to backups/"

  # ---------------------------------------------------------------------------
  # SQLC
  # ---------------------------------------------------------------------------
  sqlc-generate:
    desc: Generate SQLC code from SQL queries
    cmds:
      - sqlc generate
      - echo "SQLC code generated"

  sqlc-vet:
    desc: Validate SQLC queries
    cmds:
      - sqlc vet
      - echo "SQLC queries validated"

  sqlc-diff:
    desc: Check for uncommitted generated code changes
    cmds:
      - sqlc diff || (echo "Generated code is out of sync. Run 'task sqlc-generate' and commit the changes." && exit 1)
      - echo "Generated code is up to date"

  # ---------------------------------------------------------------------------
  # Scripting
  # ---------------------------------------------------------------------------
  script-symbols:
    desc: Regenerate the Yaegi symbol table for the cascade scripting API
    cmds:
      - yaegi extract -name syms github.com/matt0x6f/irc-client/internal/script/cascade
      - mv github_com-matt0x6f-irc-client-internal-script-cascade.go internal/script/syms/cascade_extract.go

  # ---------------------------------------------------------------------------
  # Plugins / Setup
  # ---------------------------------------------------------------------------
  plugin-dir:
    desc: Create plugin directory
    cmds:
      - mkdir -p "{{.PLUGIN_DIR}}"
      - echo "Plugin directory created at {{.PLUGIN_DIR}}"

  setup:
    desc: Initial project setup
    cmds:
      - task: mod
      - task: frontend-install
      - task: plugin-dir
      - echo "Setup complete!"

  # ---------------------------------------------------------------------------
  # Cleanup
  # ---------------------------------------------------------------------------
  clean:
    desc: Clean build artifacts (keeps committed bindings/shims and the build/ scaffold)
    cmds:
      - rm -rf bin
      - rm -rf frontend/dist
      - rm -rf frontend/bindings
      - rm -f coverage.out coverage.html
      - echo "Clean complete"

  # ---------------------------------------------------------------------------
  # Checks / Release
  # ---------------------------------------------------------------------------
  check:
    desc: Run all checks (fmt-check, lint, sqlc, test, type-check)
    cmds:
      - task: fmt-check
      - task: lint
      - task: sqlc-vet
      - task: sqlc-diff
      - task: test
      - task: frontend-type-check
      - echo "All checks complete"

  release:
    desc: Prepare release (test, lint, type-check, package)
    deps: [test, lint, frontend-type-check]
    cmds:
      - task: package
      - echo "Release build complete"

  version:
    desc: Show version information
    cmds:
      - go version
      - node --version
      - wails3 version || echo "wails3 not found"
      - head -1 go.mod
