name: macOS Build & Release

# Two intentional paths, one build job:
#   - Every merge to main: build + package the macOS app and upload it as a
#     45-day workflow artifact (version "dev-<sha7>"). Verifies the app still
#     builds/packages on macOS and lets a contributor grab a test DMG from the
#     Actions tab. This is NOT a release.
#   - Publishing a GitHub Release (incl. pre-releases): build + package and
#     attach the DMG to that release. The release/tag is created by a human, so
#     publishing is the deliberate act that ships a build. Version comes from
#     the release's tag (minus the leading "v"). Drafts don't trigger anything
#     until published.
on:
  push:
    branches: [main]
  release:
    types: [published]

# Required so the release path can upload the DMG asset to the release.
permissions:
  contents: write

jobs:
  macos:
    name: Build & package macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Use Cascade icon
        # build/ is gitignored and regenerated by Wails; drop our committed icon in
        # so Wails generates the .icns from the Cascade mark instead of its default.
        run: |
          mkdir -p build
          cp build-assets/appicon.png build/appicon.png

      - name: Derive version
        # Runs before the build so the version can be stamped into the binary via
        # -ldflags. Release builds use the release's tag (minus the leading "v");
        # merge-to-main builds use a short-SHA dev label.
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "release" ]]; then
            echo "value=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build universal app
        # -tags fts5 + CGO are required for the SQLite full-text-search schema.
        # -ldflags stamps the build metadata read by GetBuildInfo (see version.go).
        env:
          CGO_ENABLED: '1'
          VERSION: ${{ steps.version.outputs.value }}
          SHA: ${{ github.sha }}
        run: |
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          wails build -tags fts5 -platform darwin/universal -clean \
            -ldflags "-X main.version=${VERSION} -X main.commit=${SHA::7} -X main.buildDate=${BUILD_DATE}"

      - name: Package DMG
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          DMG="Cascade-${VERSION}-universal.dmg"
          if brew install create-dmg; then
            create-dmg \
              --volname "Cascade ${VERSION}" \
              --app-drop-link 450 180 \
              --icon "cascade.app" 150 180 \
              --window-size 600 360 \
              "$DMG" "build/bin/cascade.app"
          else
            echo "create-dmg unavailable; falling back to hdiutil"
            hdiutil create -volname "Cascade ${VERSION}" \
              -srcfolder "build/bin/cascade.app" -ov -format UDZO "$DMG"
          fi
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Upload build artifact (merge to main)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: cascade-macos-universal
          path: ${{ env.DMG }}
          retention-days: 45

      - name: Attach DMG to release
        if: github.event_name == 'release'
        # The release already exists (a human published it), so we only upload the
        # asset. --clobber overwrites a stale DMG if the workflow is re-run.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" "$DMG" --clobber
