name: macOS Build & Release

# Two intentional paths, one build job:
#   - Every merge to main: build + package the macOS app and auto-publish it as a
#     GitHub *pre-release*. The version is derived from the highest stable release
#     (patch-bumped, suffixed -rc.<run_number>) so it ranks above the last stable
#     but below the eventual stable of that line — exactly what the in-app updater
#     needs to offer it to users on the Prerelease channel. The DMG, updater .zip
#     and SHA256SUMS are attached just like a stable release. (A 45-day workflow
#     artifact is also uploaded for a quick grab from the Actions tab.)
#   - Publishing a GitHub Release: build + package and attach the DMG to that
#     release. The release/tag is created by a human, so publishing is the
#     deliberate act that ships a stable build. Version comes from the release's
#     tag (minus the leading "v"). Drafts don't trigger anything until published.
#
# The pre-release is created with the default GITHUB_TOKEN, whose events do NOT
# re-trigger this workflow's `release: published` path — so there's no recursion.
on:
  push:
    branches: [main]
  release:
    types: [published]

# Required so the release path can upload the DMG asset to the release.
permissions:
  contents: write

jobs:
  macos:
    name: Build & package macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.103

      - name: Derive version
        # Runs before the build so the version can be stamped into the binary via
        # -ldflags. Release builds use the release's tag (minus the leading "v").
        # Merge-to-main builds derive an auto pre-release version: take the highest
        # STABLE release by SemVer order (never a prerelease), bump the patch, and
        # append a monotonic -rc.<run_number>. That guarantees the tag sorts above
        # the last stable (so Prerelease-channel users are offered it) and below the
        # eventual stable of the same line (so they later roll onto stable). Picking
        # by `sort -V` rather than creation date keeps it correct even if a stable
        # hotfix is published out of chronological order. Emits `tag` (with the
        # leading "v", used for the GitHub release), `value` (without, stamped as
        # APP_VERSION), and `notes_start` — the tag the auto-generated changelog is
        # diffed from: the previous RC if one exists, else the latest stable, so
        # each build's notes cover just what changed since the last installable one.
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$EVENT_NAME" == "release" ]]; then
            echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
            echo "value=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            STABLE_TAG="$(gh release list --exclude-pre-releases --exclude-drafts --limit 50 \
                            --json tagName -q '.[].tagName' | sort -V | tail -1)"
            BASE="${STABLE_TAG:-v0.0.0}"
            BASE="${BASE#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))-rc.${RUN_NUMBER}"
            # Newest non-draft prerelease (by date), empty if there is none. The
            # changelog diffs from it when present so an RC shows only its own delta;
            # otherwise it falls back to the latest stable (and finally to empty for a
            # brand-new repo with neither, where GitHub auto-picks the start point).
            PREV_RC="$(gh release list --limit 50 --json tagName,isPrerelease,isDraft \
                         -q 'map(select(.isPrerelease and (.isDraft|not)))[0].tagName // empty')"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "notes_start=${PREV_RC:-$STABLE_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build universal app, DMG & update zip
        # The fts5 tag + CGO (SQLite FTS) and version ldflags are applied by the v3
        # platform Taskfile (build/darwin/Taskfile.yml). It reads APP_VERSION/
        # APP_COMMIT/APP_BUILD_DATE env overrides to stamp the release metadata
        # read by GetBuildInfo (see version.go). Produces bin/cascade.app (universal).
        env:
          CGO_ENABLED: '1'
          APP_VERSION: ${{ steps.version.outputs.value }}
          APP_COMMIT: ${{ github.sha }}
        run: |
          export APP_COMMIT="${APP_COMMIT::7}"
          export APP_BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Builds the universal .app and wraps it in a .dmg via the same Taskfile
          # path as local `task dmg-universal` (proper staging + Applications link).
          # Uses hdiutil; run `brew install create-dmg` first for a prettier layout.
          wails3 task darwin:dmg:universal
          echo "DMG=bin/Cascade-${APP_VERSION}-universal.dmg" >> "$GITHUB_ENV"
          # Always produce the updater artifact: a .zip of the .app (the self-updater
          # rejects .dmg) plus a SHA256SUMS sidecar the github provider verifies
          # downloads against. Both the stable-release path and the merge-to-main
          # pre-release path ship these so the in-app updater works on either channel.
          wails3 task darwin:zip:universal
          echo "ZIP=bin/Cascade-${APP_VERSION}-universal.zip" >> "$GITHUB_ENV"
          echo "SUMS=bin/SHA256SUMS" >> "$GITHUB_ENV"

      - name: Upload build artifact (merge to main)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: cascade-macos-universal
          path: ${{ env.DMG }}
          retention-days: 45

      - name: Publish pre-release (merge to main)
        if: github.event_name == 'push'
        # Auto-publish the merge build as a GitHub pre-release so testers on the
        # Prerelease update channel pick it up via the in-app updater. Notes are
        # GitHub's auto-generated changelog (merged PRs + new contributors) diffed
        # from NOTES_START (previous RC, else last stable), with the updater hint
        # prepended. gh release create makes the tag at this commit and attaches the
        # DMG, updater .zip and SHA256SUMS. Using the default GITHUB_TOKEN means this
        # release event does NOT re-trigger the workflow.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag }}
          SHA: ${{ github.sha }}
          NOTES_START: ${{ steps.version.outputs.notes_start }}
        run: |
          # Generate the changelog body via the Release Notes API (computes the diff
          # as if TAG were cut at this commit; no tag needs to exist yet). previous_tag_name
          # is omitted when NOTES_START is empty so GitHub auto-picks the start point.
          gen=(-f tag_name="$TAG" -f target_commitish="$SHA")
          if [ -n "$NOTES_START" ]; then gen+=(-f previous_tag_name="$NOTES_START"); fi
          BODY="$(gh api "repos/$GH_REPO/releases/generate-notes" "${gen[@]}" -q '.body' 2>/dev/null || true)"
          printf '%s\n\n%s\n' \
            "Automated pre-release from main @ ${SHA:0:7}. Install via the in-app updater on the Prerelease channel." \
            "$BODY" > "$RUNNER_TEMP/notes.md"
          gh release create "$TAG" "$DMG" "$ZIP" "$SUMS" \
            --prerelease \
            --target "$SHA" \
            --title "$TAG" \
            --notes-file "$RUNNER_TEMP/notes.md"

      - name: Attach DMG, update zip & checksums to release
        if: github.event_name == 'release'
        # The release already exists (a human published it), so we only upload the
        # assets. The DMG is the first-time human download; the .zip + SHA256SUMS are
        # what app.Updater pulls and verifies. --clobber overwrites stale assets if
        # the workflow is re-run.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" "$DMG" "$ZIP" "$SUMS" --clobber
