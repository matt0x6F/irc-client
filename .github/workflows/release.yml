name: macOS Release

# Fires on every merge to main (build + package to verify, artifact only) and
# publishes a GitHub Release when a CalVer tag (vYY.MM.PATCH, e.g. v26.06.0) is pushed.
on:
  push:
    branches: [main]
    tags: ['v[0-9]*']

# Allow the tag job to create a Release.
permissions:
  contents: write

jobs:
  macos:
    name: Build & package macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Use Cascade icon
        # build/ is gitignored and regenerated by Wails; drop our committed icon in
        # so Wails generates the .icns from the Cascade mark instead of its default.
        run: |
          mkdir -p build
          cp build-assets/appicon.png build/appicon.png

      - name: Build universal app
        # -tags fts5 + CGO are required for the SQLite full-text-search schema.
        env:
          CGO_ENABLED: '1'
        run: wails build -tags fts5 -platform darwin/universal -clean

      - name: Derive version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
          SHA: ${{ github.sha }}
        run: |
          if [[ "$IS_TAG" == "true" ]]; then
            echo "value=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package DMG
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          DMG="Cascade-${VERSION}-universal.dmg"
          if brew install create-dmg; then
            create-dmg \
              --volname "Cascade ${VERSION}" \
              --app-drop-link 450 180 \
              --icon "cascade.app" 150 180 \
              --window-size 600 360 \
              "$DMG" "build/bin/cascade.app"
          else
            echo "create-dmg unavailable; falling back to hdiutil"
            hdiutil create -volname "Cascade ${VERSION}" \
              -srcfolder "build/bin/cascade.app" -ov -format UDZO "$DMG"
          fi
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Upload build artifact (every merge)
        uses: actions/upload-artifact@v4
        with:
          name: cascade-macos-universal
          path: ${{ env.DMG }}
          retention-days: 14

      - name: Publish Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        # Upsert: gh release create is not idempotent and fails if the release
        # already exists (manual cut or a re-run). Create it only when missing;
        # otherwise just attach the DMG (--clobber to overwrite a stale asset).
        run: |
          if gh release view "$REF_NAME" >/dev/null 2>&1; then
            gh release upload "$REF_NAME" "$DMG" --clobber
          else
            gh release create "$REF_NAME" "$DMG" --generate-notes --title "$REF_NAME"
          fi
