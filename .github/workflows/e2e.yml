name: e2e

on:
  workflow_call:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The suite drives the Wails v3 server-mode build (`-tags server`): a
      # headless HTTP server. At RUNTIME it opens no window — no xvfb, no D-Bus,
      # no X server — which removes the old "XIO: fatal IO error on X server"
      # flakiness. The BUILD, however, still links GTK4/WebKitGTK: wails' internal
      # operatingsystem/assetserver packages aren't guarded by the `server` tag in
      # this alpha, so their cgo (gtk4/webkitgtk-6.0) compiles whenever CGO is on —
      # and CGO is required for the SQLite fts5 driver. The binary never *calls*
      # GTK in server mode (no init, no display), so it still runs headless; we
      # just need the dev headers to link. Docker (for the Ergo IRCd) is
      # preinstalled on GitHub's ubuntu runners.
      - name: Install build deps (GTK/WebKit headers for the cgo link + C toolchain)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      # Build the headless binary once, explicitly, so a build break is reported
      # here rather than inside the Playwright run. Uses the committed bindings +
      # production frontend build embedded into the Go binary. Export its path so
      # global-setup uses it instead of rebuilding ($GITHUB_WORKSPACE is the
      # checkout root; $GITHUB_ENV passes the var to later steps).
      - name: Build headless server binary (-tags "server fts5")
        run: |
          npm --prefix frontend run build
          CGO_ENABLED=1 go build -tags "server fts5" -o bin/cascade-server .
          echo "CASCADE_SERVER_BIN=$GITHUB_WORKSPACE/bin/cascade-server" >> "$GITHUB_ENV"

      - name: Install e2e deps + browser
        run: |
          npm ci
          npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run e2e
        run: npx playwright test
        working-directory: e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
