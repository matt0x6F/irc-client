name: Docs

# Build the Zensical documentation site and deploy it to GitHub Pages.
# Runs only when docs sources change, plus manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - "docs/public/**"
      - "zensical.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Pin the engine: Zensical is pre-1.0 and releases rapidly. Bump
      # deliberately; do not float the version. (No CI cache — Zensical's
      # caching is still being optimized and is not recommended in CI yet.)
      - name: Install Zensical (pinned)
        run: pip install zensical==0.0.46

      - name: Build site
        run: zensical build --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
